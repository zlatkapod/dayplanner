
<div id="notes-list">
  {% set all_notes = plan.get('notes', []) %}
  {% if all_notes %}
    {% for note in all_notes %}
      <div id="note-item-{{ loop.index0 }}" class="dp-note-card">
        <div class="dp-note-card-text">{{ note }}</div>
        <div class="dp-row-actions">
          <button class="dp-ghost" type="button"
            hx-get="/note_item/edit?date={{ plan.date }}&index={{ loop.index0 }}"
            hx-target="#note-item-{{ loop.index0 }}"
            hx-swap="outerHTML"
            title="Edit">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
          </button>
          <form hx-post="/note_item/delete" hx-target="#notes-list" hx-swap="outerHTML" class="m-0">
            <input type="hidden" name="date" value="{{ plan.date }}"/>
            <input type="hidden" name="index" value="{{ loop.index0 }}"/>
            <button class="dp-ghost del" type="submit" title="Delete">
              <svg width="12" height="12" viewBox="0 0 24 24"><path fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" d="M18 6L6 18M6 6l12 12"/></svg>
            </button>
          </form>
        </div>
      </div>
    {% endfor %}
  {% else %}
    <p class="dp-muted" style="padding: 6px 0; font-size: 0.82rem;">Nothing here yet.</p>
  {% endif %}
</div>
