
<div id="todos">
  {% if plan.todos %}
    <ul id="todo-list" data-date="{{ plan.date }}" class="list-unstyled mb-0">
      {% for t in plan.todos %}
        {% set is_done = t.startswith('✓ ') %}
        {% if not is_done %}
          <li class="dp-row" data-text="{{ t }}">
            <span class="dp-row-text">{{ t }}</span>
            <div class="dp-row-actions">
              <form hx-post="/todo/move_next" hx-target="#todos" hx-swap="outerHTML" class="m-0">
                <input type="hidden" name="date" value="{{ plan.date }}"/>
                <input type="hidden" name="source" value="dashboard"/>
                <input type="hidden" name="index" value="{{ loop.index0 }}"/>
                <button class="dp-ghost" type="submit" title="Move to next day">
                  <svg width="13" height="13" viewBox="0 0 24 24"><path fill="currentColor" d="M6.41 6L5 7.41 9.58 12L5 16.59 6.41 18l6-6z"/><path fill="currentColor" d="M13 6l-1.41 1.41L16.17 12l-4.58 4.59L13 18l6-6z"/></svg>
                </button>
              </form>
              <form hx-post="/todo/done" hx-target="#todos" hx-swap="outerHTML" class="m-0">
                <input type="hidden" name="date" value="{{ plan.date }}"/>
                <input type="hidden" name="source" value="dashboard"/>
                <input type="hidden" name="index" value="{{ loop.index0 }}"/>
                <button class="dp-ghost" type="submit" title="Mark done">
                  <svg width="13" height="13" viewBox="0 0 24 24"><path fill="currentColor" d="M9 16.2 4.8 12l-1.4 1.4L9 19 21 7l-1.4-1.4z"/></svg>
                </button>
              </form>
              <form hx-post="/todo/delete" hx-target="#todos" hx-swap="outerHTML" class="m-0">
                <input type="hidden" name="date" value="{{ plan.date }}"/>
                <input type="hidden" name="source" value="dashboard"/>
                <input type="hidden" name="index" value="{{ loop.index0 }}"/>
                <button class="dp-ghost del" type="submit" title="Delete">
                  <svg width="13" height="13" viewBox="0 0 24 24"><path fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" d="M18 6L6 18M6 6l12 12"/></svg>
                </button>
              </form>
            </div>
          </li>
        {% else %}
          {% set raw = t[2:] %}
          <li class="dp-row" data-text="{{ t }}">
            <span class="dp-row-text done">{{ raw }}</span>
            <div class="dp-row-actions">
              <form hx-post="/todo/delete" hx-target="#todos" hx-swap="outerHTML" class="m-0">
                <input type="hidden" name="date" value="{{ plan.date }}"/>
                <input type="hidden" name="source" value="dashboard"/>
                <input type="hidden" name="index" value="{{ loop.index0 }}"/>
                <button class="dp-ghost del" type="submit" title="Delete">
                  <svg width="13" height="13" viewBox="0 0 24 24"><path fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" d="M18 6L6 18M6 6l12 12"/></svg>
                </button>
              </form>
            </div>
          </li>
        {% endif %}
      {% endfor %}
    </ul>
  {% else %}
    <p class="dp-muted" style="padding: 6px 0; font-size: 0.82rem;">Nothing here yet.</p>
  {% endif %}
</div>
