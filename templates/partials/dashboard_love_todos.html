
<div id="love-todos" class="dp-todos">
  {% if plan.get('love_todos') %}
    <ul id="love-todo-list" data-date="{{ plan.date }}" class="list-unstyled d-flex flex-column gap-2">
      {% for t in plan.get('love_todos', []) %}
        <li class="todo-item d-flex align-items-center gap-2 w-100" data-text="{{ t }}">
          <span style="font-size: 1rem; flex-shrink: 0; line-height: 1;">❤️</span>
          <span class="todo-pick flex-grow-1">{{ t }}</span>
          <div class="ms-auto d-flex align-items-center gap-2">
            <form hx-post="/love_todo/move_next" hx-target="#love-todos" hx-swap="outerHTML" class="m-0">
              <input type="hidden" name="date" value="{{ plan.date }}"/>
              <input type="hidden" name="index" value="{{ loop.index0 }}"/>
              <button class="btn btn-warning btn-sm" type="submit" title="Move to next day" aria-label="Move to next day">
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" aria-hidden="true">
                  <path fill="currentColor" d="M6.41 6L5 7.41 9.58 12L5 16.59 6.41 18l6-6z"/>
                  <path fill="currentColor" d="M13 6l-1.41 1.41L16.17 12l-4.58 4.59L13 18l6-6z"/>
                </svg>
              </button>
            </form>
            <form hx-post="/love_todo/delete" hx-target="#love-todos" hx-swap="outerHTML" class="m-0">
              <input type="hidden" name="date" value="{{ plan.date }}"/>
              <input type="hidden" name="index" value="{{ loop.index0 }}"/>
              <button class="btn btn-danger btn-sm" type="submit" title="Delete" aria-label="Delete">
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" aria-hidden="true">
                  <g fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M4 7h16"/>
                    <path d="M10 11v6"/>
                    <path d="M14 11v6"/>
                    <path d="M6 7l1 13a2 2 0 0 0 2 2h6a2 2 0 0 0 2-2l1-13"/>
                    <path d="M9 7V5a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2v2"/>
                  </g>
                </svg>
              </button>
            </form>
          </div>
        </li>
      {% endfor %}
    </ul>
  {% else %}
    <p class="dp-muted">No love todos yet. Add some above.</p>
  {% endif %}
</div>
