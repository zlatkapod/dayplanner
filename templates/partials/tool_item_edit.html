<div class="modal-header border-bottom">
  <h5 class="modal-title" style="font-size:.92rem; font-weight:700;">Edit Tool</h5>
  <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
</div>
<div class="modal-body">
  <form hx-post="/tools/item/update" hx-swap="none">
    <input type="hidden" name="item_id" value="{{ item.id }}"/>
    <input type="hidden" name="from_category_id" value="{{ current_category_id }}"/>
    <div class="row g-3">
      <div class="col-12 col-sm-6">
        <label class="form-label small fw-semibold mb-1">Name</label>
        <input name="name" class="form-control form-control-sm"
               value="{{ item.name }}" required />
      </div>
      <div class="col-12 col-sm-6">
        <label class="form-label small fw-semibold mb-1">URL</label>
        <input name="url" class="form-control form-control-sm"
               value="{{ item.url }}" required />
      </div>
      <div class="col-12 col-sm-6">
        <label class="form-label small fw-semibold mb-1">Category</label>
        <select name="category_id" class="form-select form-select-sm">
          {% for c2 in categories %}
          <option value="{{ c2.id }}" {% if c2.id == current_category_id %}selected{% endif %}>
            {{ c2.name }}
          </option>
          {% endfor %}
        </select>
      </div>
      <div class="col-12 col-sm-6">
        <label class="form-label small fw-semibold mb-1">Tags</label>
        <input name="tags" class="form-control form-control-sm tagify-init"
               value="{{ item.keywords | join(',') }}"
               placeholder="Add tags…" />
      </div>
      <div class="col-12">
        <label class="form-label small fw-semibold mb-1">Accent color</label>
        <div class="color-picker-wrap">
          <input type="color" name="color" class="color-native"
                 value="{{ item.color or '#9ca3af' }}">
          <span class="text-muted small">Decorative top stripe on the card</span>
        </div>
      </div>
    </div>
    <div class="mt-4 d-flex justify-content-end gap-2">
      <button type="button" class="btn btn-outline-secondary btn-sm"
              data-bs-dismiss="modal">Cancel</button>
      <button type="submit" class="btn btn-primary btn-sm">Save changes</button>
    </div>
  </form>
</div>
