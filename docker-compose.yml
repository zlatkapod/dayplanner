services:
  web:
    build: .
    image: dayplanner:latest
    container_name: dayplanner
    ports:
      - "${PORT:-8383}:8383"
    volumes:
      - dayplanner_data:/app/data
    environment:
      - DATA_DIR=/app/data
      - LATITUDE=52.2777
      - LONGITUDE=6.1730
      - LOG_LEVEL=INFO
      - TZ=${TZ:-Europe/Amsterdam}
    restart: unless-stopped

  highlight:
    build: .
    image: dayplanner:latest
    container_name: dayplanner-highlight
    ports:
      - "8384:8384"
    volumes:
      - dayplanner_data:/app/data
    environment:
      - DATA_DIR=/app/data
      - TZ=${TZ:-Europe/Amsterdam}
    command: uvicorn highlight_service:app --host 0.0.0.0 --port 8384
    restart: unless-stopped
  backup:
    build:
      context: .
      dockerfile: Dockerfile.backup
    environment:
      - SRC_DIR=/data
      - DEST_DIR=/backup                 # ignored if REMOTE is set
      # - REMOTE=user@server:/srv/backups/dayplanner   # uncomment to push remote
      # - RSYNC_OPTS=-a --delete -z                    # add -z for remote
    volumes:
      - dayplanner_data:/data:ro         # your app’s volume (read-only)
      - ./backups:/backup                # host folder for local mirror
      - ~/.ssh:/root/.ssh:ro             # needed if REMOTE uses SSH
volumes:
  dayplanner_data: {}
