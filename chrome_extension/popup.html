<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Day Planner Highlighter</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      width: 320px;
      background: #0f0f0f;
      color: #e8e8e8;
      padding: 16px;
    }

    h1 {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: #888;
      margin-bottom: 12px;
    }

    textarea {
      width: 100%;
      height: 110px;
      resize: vertical;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 6px;
      color: #e8e8e8;
      font-size: 13px;
      line-height: 1.5;
      padding: 10px;
      outline: none;
      transition: border-color 0.15s;
    }

    textarea:focus { border-color: #555; }

    .url {
      margin-top: 8px;
      font-size: 11px;
      color: #555;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    button {
      margin-top: 12px;
      width: 100%;
      padding: 9px;
      border: none;
      border-radius: 6px;
      background: #2d6a4f;
      color: #fff;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }

    button:hover { background: #3a8a66; }
    button:disabled { background: #333; color: #666; cursor: default; }

    #status {
      margin-top: 10px;
      font-size: 12px;
      text-align: center;
      min-height: 16px;
    }

    .ok  { color: #52b788; }
    .err { color: #e07070; }
  </style>
</head>
<body>
  <h1>Capture to today's notes</h1>
  <textarea id="text" placeholder="Select text on the page, then open this popup…"></textarea>
  <div class="url" id="url"></div>
  <button id="capture" disabled>Capture</button>
  <div id="status"></div>
  <script src="popup.js"></script>
</body>
</html>
